name: Windows Build

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*.*"
      - "*.*.*"
      - "*.*.*.*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release when the ref is a version tag"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      is_version_tag: ${{ steps.version.outputs.is_version_tag }}
      should_release: ${{ steps.version.outputs.should_release }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      previous_release_tag: ${{ steps.version.outputs.previous_release_tag }}
      normalized_version: ${{ steps.version.outputs.normalized_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      version_quad: ${{ steps.version.outputs.version_quad }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch CLD2 dependency
        shell: powershell
        run: |
          if (Test-Path "cld2\public\compact_lang_det.h") {
            Write-Host "cld2 dependency already present."
          } else {
            git clone https://github.com/CLD2Owners/cld2 cld2
          }

          git -C cld2 fetch --depth 1 origin b56fa78a2fe44ac2851bae5bf4f4693a0644da7b
          git -C cld2 checkout --force b56fa78a2fe44ac2851bae5bf4f4693a0644da7b

      - name: Evaluate version tag
        id: version
        shell: powershell
        run: |
          $ref = "${{ github.ref }}"
          $refName = "${{ github.ref_name }}"
          $pattern = '^[vV]?(\d+)\.(\d+)\.(\d+)(?:\.(\d+))?$'

          $isTagRef = $ref.StartsWith("refs/tags/")
          $isVersionTag = $false
          $shouldRelease = $false
          $previousTag = ""
          $previousReleaseTag = ""
          $normalizedVersion = ""
          $releaseTag = $refName
          $versionQuad = ""

          function Normalize-Version([string]$tagValue) {
            if ($tagValue -notmatch $pattern) {
              return $null
            }

            return [PSCustomObject]@{
              Tag = $tagValue
              Major = [int]$Matches[1]
              Minor = [int]$Matches[2]
              Patch = [int]$Matches[3]
              Build = if ($Matches[4]) { [int]$Matches[4] } else { 0 }
              Normalized = "$([int]$Matches[1]).$([int]$Matches[2]).$([int]$Matches[3])"
            }
          }

          $currentVersion = $null
          if ($isTagRef) {
            $currentVersion = Normalize-Version $refName
            if ($null -ne $currentVersion) {
              $isVersionTag = $true
              $normalizedVersion = $currentVersion.Normalized
              $releaseTag = $refName
              $versionQuad = "$($currentVersion.Major),$($currentVersion.Minor),$($currentVersion.Patch),$($currentVersion.Build)"
            }
          }

          if ($isVersionTag) {
            $allVersionTags = git tag | Where-Object { $_ -match $pattern } | ForEach-Object { Normalize-Version $_ } | Where-Object { $null -ne $_ }

            $sortedTags = $allVersionTags | Sort-Object Major, Minor, Patch, Build
            $previous = $sortedTags | Where-Object {
              $_.Tag -ne $currentVersion.Tag -and
              (
                $_.Major -lt $currentVersion.Major -or
                ($_.Major -eq $currentVersion.Major -and $_.Minor -lt $currentVersion.Minor) -or
                ($_.Major -eq $currentVersion.Major -and $_.Minor -eq $currentVersion.Minor -and $_.Patch -lt $currentVersion.Patch) -or
                ($_.Major -eq $currentVersion.Major -and $_.Minor -eq $currentVersion.Minor -and $_.Patch -eq $currentVersion.Patch -and $_.Build -lt $currentVersion.Build)
              )
            } | Select-Object -Last 1

            if ($null -ne $previous) {
              $previousTag = $previous.Tag
            }

            $previousRelease = $sortedTags | Where-Object {
              $_.Tag -ne $currentVersion.Tag -and
              (
                $_.Major -lt $currentVersion.Major -or
                ($_.Major -eq $currentVersion.Major -and $_.Minor -lt $currentVersion.Minor) -or
                ($_.Major -eq $currentVersion.Major -and $_.Minor -eq $currentVersion.Minor -and $_.Patch -lt $currentVersion.Patch)
              )
            } | Select-Object -Last 1

            if ($null -ne $previousRelease) {
              $previousReleaseTag = $previousRelease.Tag
            }

            if (
              $null -eq $previous -or
              $previous.Major -ne $currentVersion.Major -or
              $previous.Minor -ne $currentVersion.Minor -or
              $previous.Patch -ne $currentVersion.Patch
            ) {
              $shouldRelease = $true
            } else {
              $shouldRelease = $false
            }
          }

          "is_version_tag=$($isVersionTag.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "should_release=$($shouldRelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "previous_tag=$previousTag" >> $env:GITHUB_OUTPUT
          "previous_release_tag=$previousReleaseTag" >> $env:GITHUB_OUTPUT
          "normalized_version=$normalizedVersion" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "version_quad=$versionQuad" >> $env:GITHUB_OUTPUT

      - name: Inject version into resource files
        if: steps.version.outputs.is_version_tag == 'true'
        shell: powershell
        run: |
          $versionQuad = "${{ steps.version.outputs.version_quad }}"
          $releaseTag = "${{ steps.version.outputs.release_tag }}"

          if ([string]::IsNullOrWhiteSpace($versionQuad)) {
            throw "version_quad is empty for version tag build."
          }

          $targets = @("Resource.rc", "llmview.rc")

          foreach ($path in $targets) {
            $content = Get-Content -Raw $path
            $updated = $content
            $updated = [regex]::Replace($updated, 'FILEVERSION\s+\d+,\d+,\d+,\d+', "FILEVERSION $versionQuad")
            $updated = [regex]::Replace($updated, 'PRODUCTVERSION\s+\d+,\d+,\d+,\d+', "PRODUCTVERSION $versionQuad")
            $updated = [regex]::Replace($updated, 'VALUE "FileVersion", "\d+,\d+,\d+,\d+"', "VALUE `"FileVersion`", `"$versionQuad`"")
            $updated = [regex]::Replace($updated, 'VALUE "ProductVersion", "\d+,\d+,\d+,\d+"', "VALUE `"ProductVersion`", `"$versionQuad`"")
            $updated = [regex]::Replace($updated, '(LTEXT\s+")((?:Version|版本)\s+)[^"]+(")', "`$1`$2$releaseTag`$3")

            if ($updated -ne $content) {
              $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
              [System.IO.File]::WriteAllText((Resolve-Path $path), $updated, $utf8NoBom)
            }
          }

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: cmd
        run: build.bat Release x64

      - name: Package zip archive
        if: github.event_name == 'workflow_dispatch' || steps.version.outputs.is_version_tag == 'true'
        shell: powershell
        run: |
          $packageDir = "dist\MarkdownViewer-windows-x64"
          $archivePath = "dist\MarkdownViewer-windows-x64.zip"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "x64\Release\mdview.exe" -Destination $packageDir -Force
          Copy-Item "x64\Release\llmview.exe" -Destination $packageDir -Force

          if (Test-Path "README.md") {
            Copy-Item "README.md" -Destination $packageDir -Force
          }

          if (Test-Path "Screenshot.jpg") {
            Copy-Item "Screenshot.jpg" -Destination $packageDir -Force
          }

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path "$packageDir\*" -DestinationPath $archivePath -CompressionLevel Optimal

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch' || steps.version.outputs.is_version_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownViewer-windows-x64-zip
          path: dist\MarkdownViewer-windows-x64.zip
          if-no-files-found: error

  release:
    needs: build
    if: needs.build.outputs.is_version_tag == 'true' && needs.build.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: MarkdownViewer-windows-x64-zip
          path: dist

      - name: Generate release notes
        id: notes
        shell: powershell
        run: |
          $releaseTag = "${{ needs.build.outputs.release_tag }}"
          $normalizedVersion = "${{ needs.build.outputs.normalized_version }}"
          $previousReleaseTag = "${{ needs.build.outputs.previous_release_tag }}"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $previousDisplayTag = "none"

          if (-not [string]::IsNullOrWhiteSpace($previousReleaseTag)) {
            $previousDisplayTag = $previousReleaseTag
          }

          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add(("Release version: `{0}`" -f $releaseTag))
          $lines.Add("")
          $lines.Add(("Normalized version: `{0}`" -f $normalizedVersion))
          $lines.Add("")
          $lines.Add('Package: `MarkdownViewer-windows-x64.zip`')
          $lines.Add("")
          $lines.Add('Contents:')
          $lines.Add('- `mdview.exe`')
          $lines.Add('- `llmview.exe`')
          $lines.Add('- `README.md`')
          $lines.Add('- `Screenshot.jpg`')
          $lines.Add("")
          $lines.Add(("Previous release tag: `{0}`" -f $previousDisplayTag))
          $lines.Add("")
          $lines.Add('Changes since last release:')

          if ([string]::IsNullOrWhiteSpace($previousReleaseTag)) {
            $commitMessages = git log $releaseTag --pretty=format:"%s"
          } else {
            $commitMessages = git log "$previousReleaseTag..$releaseTag" --pretty=format:"%s"
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to collect commit messages for release notes."
          }

          if ([string]::IsNullOrWhiteSpace($commitMessages)) {
            $lines.Add('- No commit messages found.')
          } else {
            foreach ($message in ($commitMessages -split "`r?`n")) {
              $trimmed = $message.Trim()
              if (-not [string]::IsNullOrWhiteSpace($trimmed)) {
                $lines.Add("- $trimmed")
              }
            }
          }

          [System.IO.File]::WriteAllLines($notesPath, $lines)
          "body_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: MarkdownViewer ${{ needs.build.outputs.release_tag }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: dist/MarkdownViewer-windows-x64.zip

  skip-release-note:
    needs: build
    if: needs.build.outputs.is_version_tag == 'true' && needs.build.outputs.should_release != 'true'
    runs-on: windows-latest

    steps:
      - name: Explain skipped release
        shell: powershell
        run: |
          $previousTag = "${{ needs.build.outputs.previous_tag }}"
          Write-Host "Skipping GitHub Release for ${{ needs.build.outputs.release_tag }} because X.Y.Z did not change compared with '$previousTag'."
